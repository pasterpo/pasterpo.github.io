<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTMLLeaf</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#4caf50;--green-dk:#388e3c;
  --bg:#1e1e1e;--sb:#252526;--eb:#1e1e1e;
  --bdr:#3e3e3e;--txt:#d4d4d4;--mut:#666;
}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt)}
body{display:flex;flex-direction:column}

/* HEADER */
#hdr{height:42px;background:#2a2a2a;border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
.logo{font-size:15px;font-weight:800;color:var(--green);display:flex;align-items:center;gap:5px}
.logo svg{width:16px;height:16px}
#doc-name{font-size:12px;color:var(--mut);margin-left:2px}
#hdr-r{margin-left:auto;display:flex;gap:5px;align-items:center}
button{font-family:inherit;cursor:pointer}
.btn{font-size:12px;padding:4px 10px;border-radius:4px;border:1px solid var(--bdr);background:transparent;color:var(--txt);transition:background .12s;white-space:nowrap}
.btn:hover{background:#3a3a3a}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-green{background:var(--green);border-color:var(--green);color:#fff;font-weight:700;font-size:13px;padding:5px 15px;display:flex;align-items:center;gap:5px;border-radius:5px;border:none}
.btn-green:hover{background:var(--green-dk)}
.btn-green svg{width:12px;height:12px}

/* TOOLBAR */
#toolbar{height:40px;background:var(--sb);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 8px;gap:1px;flex-shrink:0;overflow-x:auto}
#toolbar::-webkit-scrollbar{height:2px}#toolbar::-webkit-scrollbar-thumb{background:#444}
.tsep{width:1px;height:16px;background:#444;margin:0 4px;flex-shrink:0}
.tbtn{background:transparent;border:none;color:var(--mut);padding:4px 6px;border-radius:3px;font-size:12px;font-family:'Courier New',monospace;white-space:nowrap;flex-shrink:0;transition:background .1s,color .1s}
.tbtn:hover{background:#3a3a3a;color:var(--txt)}
.tsel{background:#333;color:var(--txt);border:1px solid #444;border-radius:3px;font-size:11px;padding:2px 4px;outline:none;font-family:inherit;flex-shrink:0;cursor:pointer}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:5px;flex-shrink:0;padding-left:6px}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden;min-height:0}

/* PROJECTS */
#pjpanel{width:200px;background:#1a1a1a;border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .18s}
#pjpanel.collapsed{width:0}
.pj-head{padding:7px 10px;font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;white-space:nowrap}
.pj-new{background:var(--green);color:#fff;border:none;border-radius:3px;font-size:10px;padding:2px 7px;cursor:pointer;font-weight:600;font-family:inherit}
.pj-new:hover{background:var(--green-dk)}
#pjlist{flex:1;overflow-y:auto;padding:3px 0}
#pjlist::-webkit-scrollbar{width:4px}#pjlist::-webkit-scrollbar-thumb{background:#333}
.pji{display:flex;align-items:center;padding:6px 8px;font-size:12px;cursor:pointer;color:var(--mut);gap:5px;border-left:3px solid transparent}
.pji:hover{background:#222;color:var(--txt)}
.pji.active{background:#0d3a5c;color:#90caf9;border-left-color:var(--green)}
.pji-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.pji-date{font-size:9px;color:#444;display:block}
.pji-del{opacity:0;font-size:13px;color:#e06c75;border:none;background:none;cursor:pointer;padding:0 2px;line-height:1}
.pji:hover .pji-del{opacity:1}
.pj-empty{padding:14px 10px;font-size:11px;color:#3a3a3a;text-align:center;line-height:1.6}

/* INFO SIDEBAR */
#infosb{width:155px;background:var(--sb);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0}
.sb-hd{padding:6px 9px;font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--bdr)}
.sb-sec{border-top:1px solid var(--bdr);padding:6px 9px}
.sb-ttl{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
#clog{font-size:10px;font-family:'Courier New',monospace;color:#72c353;background:#141414;border-radius:3px;padding:4px 5px;min-height:44px;max-height:100px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
#wc{font-size:11px;color:var(--mut)}

/* EDITOR */
#edpanel{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--bdr);min-width:0}
.tabbar{height:32px;display:flex;align-items:stretch;background:#252526;border-bottom:1px solid var(--bdr);flex-shrink:0}
.tab{display:flex;align-items:center;gap:5px;padding:0 12px;font-size:12px;color:var(--mut);border-right:1px solid var(--bdr)}
.tab.active{background:var(--eb);color:var(--txt);border-bottom:2px solid var(--green)}
.tab svg{width:11px;height:11px}
.ew{flex:1;position:relative;overflow:hidden}
#editor{position:absolute;inset:0;width:100%;height:100%;background:var(--eb);color:#d4d4d4;border:none;outline:none;resize:none;font-family:'Courier New',Consolas,monospace;font-size:13px;line-height:1.65;padding:10px 10px 10px 48px;tab-size:2;caret-color:#fff}
#lnums{position:absolute;left:0;top:0;width:40px;padding:10px 5px 10px 0;text-align:right;font-family:'Courier New',monospace;font-size:13px;line-height:1.65;color:#3a3a3a;pointer-events:none;overflow:hidden;user-select:none;background:var(--eb);border-right:1px solid #2a2a2a}

/* PREVIEW */
#pvpanel{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
.ptop{background:#2a2a2a;border-bottom:1px solid var(--bdr);padding:4px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.ptop span{font-size:11px;color:var(--mut)}
#cstatus{font-size:11px;color:var(--mut);margin-left:auto}
#cstatus.ok{color:#72c353}#cstatus.err{color:#e06c75}
#pvwrap{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column}
#pvdoc{flex:1;border:none;display:block;width:100%;height:100%}
#cov{display:none;position:absolute;inset:0;background:rgba(15,15,15,.82);align-items:center;justify-content:center;flex-direction:column;gap:10px;z-index:10;pointer-events:none}
#cov.show{display:flex;pointer-events:all}
.spin{width:28px;height:28px;border:3px solid #333;border-top-color:var(--green);border-radius:50%;animation:sp .65s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#cov-lbl{font-size:12px;color:#999}
#ph{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#aaa;font-size:13px;padding:60px 0;pointer-events:none}
#ph svg{width:36px;height:36px;opacity:.25}

/* STATUS BAR */
#sbar{height:21px;background:#388e3c;display:flex;align-items:center;padding:0 10px;font-size:11px;color:rgba(255,255,255,.82);gap:12px;flex-shrink:0}
.sdot{width:5px;height:5px;border-radius:50%;background:#a5d6a7;flex-shrink:0}
#sr{margin-left:auto;display:flex;gap:12px}

/* MODAL */
#mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center}
#mbg.show{display:flex}
#mdl{background:#2a2a2a;border:1px solid #555;border-radius:8px;padding:20px 22px;width:300px;display:flex;flex-direction:column;gap:12px}
#mdl h3{font-size:14px;color:var(--txt);font-weight:600}
#mdl input{background:#1e1e1e;border:1px solid #555;border-radius:4px;color:var(--txt);font-size:13px;padding:7px 10px;outline:none;font-family:inherit;width:100%}
#mdl input:focus{border-color:var(--green)}
#mdl-btns{display:flex;gap:8px;justify-content:flex-end}


@media(max-width:820px){#infosb,#pjpanel{display:none}}
</style>
</head>
<body>

<!-- MODAL -->
<div id="mbg">
  <div id="mdl">
    <h3 id="mdl-title">New Project</h3>
    <input type="text" id="mdl-input" placeholder="Project name..." maxlength="60">
    <div id="mdl-btns">
      <button class="btn" id="mdl-cancel">Cancel</button>
      <button class="btn-green" id="mdl-ok">Create</button>
    </div>
  </div>
</div>

<!-- HIDDEN PDF RENDER TARGET -->

<!-- HEADER -->
<div id="hdr">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M14 2H6a2 2 0 0 0-2 2v16c0 1.1.9 2 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    HTMLLeaf
  </div>
  <span id="doc-name">untitled.html</span>
  <div id="hdr-r">
    <button class="btn" id="btn-toggle-pj">⊞ Projects</button>
    <button class="btn" id="btn-save">💾 Save</button>
    <button class="btn" id="btn-open">📂 Open</button>
    <input type="file" id="fileinput" accept=".html,.htm" style="display:none">
    <button class="btn" id="btn-dl-html">⬇ HTML</button>
    <button class="btn" id="btn-dl-pdf">⬇ PDF</button>
    <button class="btn-green" id="btn-compile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="5 3 19 12 5 21 5 3"/></svg>
      Compile
    </button>
  </div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <select class="tsel" id="ins-tag">
    <option value="">Insert...</option>
    <option value="h1">H1</option><option value="h2">H2</option><option value="h3">H3</option>
    <option value="p">Paragraph</option><option value="ul">List (ul)</option>
    <option value="ol">List (ol)</option><option value="table">Table</option>
    <option value="img">Image</option><option value="code">Code block</option>
    <option value="blockquote">Blockquote</option><option value="hr">Divider</option>
    <option value="link">Link</option><option value="div">Div</option>
  </select>
  <div class="tsep"></div>
  <button class="tbtn" id="tb-b" title="Bold Ctrl+B"><b>B</b></button>
  <button class="tbtn" id="tb-i" title="Italic Ctrl+I"><i>I</i></button>
  <button class="tbtn" id="tb-u" title="Underline"><u>U</u></button>
  <button class="tbtn" id="tb-s" title="Strike"><s>S</s></button>
  <div class="tsep"></div>
  <button class="tbtn" id="tb-r" title="Red"   style="color:#e57373">A</button>
  <button class="tbtn" id="tb-bl" title="Blue"  style="color:#64b5f6">A</button>
  <button class="tbtn" id="tb-g" title="Green" style="color:#81c784">A</button>
  <div class="tsep"></div>
  <button class="tbtn" id="tb-sub"  title="Subscript">x₂</button>
  <button class="tbtn" id="tb-sup"  title="Superscript">x²</button>
  <button class="tbtn" id="tb-mk"   title="Highlight">▮</button>
  <button class="tbtn" id="tb-code" title="Inline code">&lt;/&gt;</button>
  <div class="tsep"></div>
  <button class="tbtn" id="btn-indent">⇥ Indent</button>
  <button class="tbtn" id="btn-fmt">✦ Format</button>
  <div class="tb-right">
    <span style="font-size:11px;color:var(--mut)">Page:</span>
    <select class="tsel" id="pgsz">
      <option value="a4">A4</option>
      <option value="letter">Letter</option>
      <option value="a3">A3</option>
    </select>
    <select class="tsel" id="pgori">
      <option value="portrait">Portrait</option>
      <option value="landscape">Landscape</option>
    </select>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- PROJECTS -->
  <div id="pjpanel">
    <div class="pj-head">
      Projects
      <button class="pj-new" id="btn-new-pj">+ New</button>
    </div>
    <div id="pjlist"></div>
  </div>

  <!-- INFO SIDEBAR -->
  <div id="infosb">
    <div class="sb-hd">Info</div>
    <div class="sb-sec">
      <div class="sb-ttl">Log</div>
      <div id="clog">Ready.</div>
    </div>
    <div class="sb-sec" style="border-top:1px solid var(--bdr)">
      <div class="sb-ttl">Stats</div>
      <div id="wc">—</div>
    </div>
  </div>

  <!-- EDITOR -->
  <div id="edpanel">
    <div class="tabbar">
      <div class="tab active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        <span id="tab-fn">untitled.html</span>
      </div>
    </div>
    <div class="ew">
      <div id="lnums">1</div>
      <textarea id="editor" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
    </div>
  </div>

  <!-- PREVIEW -->
  <div id="pvpanel">
    <div class="tabbar">
      <div class="tab active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Compiled Output
      </div>
    </div>
    <div class="ptop">
      <span>Preview</span>
      <span id="cstatus">Not compiled</span>
      <button class="btn" id="btn-recompile" style="font-size:11px;padding:2px 7px">↻</button>
      <button class="btn" id="btn-fs" style="font-size:11px;padding:2px 7px">⛶ Full</button>
    </div>
    <div id="pvwrap">
      <div id="ph">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
        Press Compile to render
      </div>
      <iframe id="pvdoc" sandbox="allow-scripts allow-same-origin"></iframe>
      <div id="cov">
        <div class="spin"></div>
        <div id="cov-lbl">Compiling…</div>
      </div>
    </div>
  </div>

</div>

<!-- STATUS -->
<div id="sbar">
  <div class="sdot"></div>
  <span id="stxt">Ready</span>
  <div id="sr">
    <span id="cpos">Ln 1, Col 1</span>
    <span>HTML5</span><span>UTF-8</span>
  </div>
</div>

<script>
// ── STARTER ────────────────────────────────────────────────────────────────────
var STARTER = [
'<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>My Document</title>',
'<style>',
'body{font-family:Georgia,serif;max-width:720px;margin:48px auto;padding:0 40px;color:#1a1a1a;line-height:1.75;font-size:15px}',
'h1{font-size:28px;border-bottom:2px solid #eee;padding-bottom:8px;margin-bottom:6px}',
'h2{font-size:20px;margin-top:28px;color:#222}',
'.sub{color:#777;font-style:italic;margin-bottom:22px;font-size:14px}',
'p{margin-bottom:13px}',
'ul,ol{margin:8px 0 12px 22px}li{margin-bottom:4px}',
'table{border-collapse:collapse;width:100%;margin:16px 0;font-size:14px}',
'th{background:#f5f5f5;font-weight:bold;border:1px solid #ccc;padding:8px 12px;text-align:left}',
'td{border:1px solid #ddd;padding:7px 12px}tr:nth-child(even) td{background:#fafafa}',
'code{background:#f0f0f0;padding:2px 5px;border-radius:3px;font-family:monospace;font-size:13px;color:#c7254e}',
'pre{background:#f8f8f8;border:1px solid #e0e0e0;border-radius:4px;padding:12px 16px}',
'pre code{background:none;color:#333;padding:0}',
'blockquote{border-left:4px solid #4caf50;margin:16px 0;padding:8px 16px;color:#555;background:#f9fff9;font-style:italic}',
'.note{background:#fff8e1;border-left:4px solid #ffc107;padding:10px 14px;margin:12px 0}',
'</style></head><body>',
'<h1>My Research Document</h1>',
'<p class="sub">Author Name &mdash; April 2026</p>',
'<h2>1. Introduction</h2>',
'<p>Written in <strong>HTMLLeaf</strong> &mdash; an Overleaf-style HTML editor. Write here, compile, and export a real PDF.</p>',
'<h2>2. Mathematics</h2>',
'<p>For twin primes <em>(p, p+2)</em>: <code>a=(p&sup2;&minus;1)/2</code>, <code>b=((p+2)&sup2;&minus;1)/2</code>. Then <strong>a+b=(p+1)&sup2;</strong>.</p>',
'<div class="note"><strong>Note:</strong> This identity connects every twin prime pair to a perfect square.</div>',
'<h2>3. Data Table</h2>',
'<table>',
'  <tr><th>p</th><th>p+2</th><th>a</th><th>b</th><th>a+b</th></tr>',
'  <tr><td>5</td><td>7</td><td>12</td><td>24</td><td>36 = 6&sup2;</td></tr>',
'  <tr><td>11</td><td>13</td><td>60</td><td>84</td><td>144 = 12&sup2;</td></tr>',
'  <tr><td>17</td><td>19</td><td>144</td><td>180</td><td>324 = 18&sup2;</td></tr>',
'</table>',
'<h2>4. Code Sample</h2>',
'<pre><code>function isTwinPrime(p) {\n  return isPrime(p) &amp;&amp; isPrime(p + 2);\n}</code></pre>',
'<h2>5. Conclusion</h2>',
'<blockquote>Press <strong>Compile</strong> (Ctrl+Enter) then <strong>&#8595; PDF</strong> to get a real .pdf file.</blockquote>',
'</body></html>'
].join('\n');

// ── DOM REFS ──────────────────────────────────────────────────────────────────
var ed      = document.getElementById('editor');
var pvdoc   = document.getElementById('pvdoc');
var lnums   = document.getElementById('lnums');
var clog    = document.getElementById('clog');
var cstatus = document.getElementById('cstatus');
var stxt    = document.getElementById('stxt');
var cpos    = document.getElementById('cpos');
var cov     = document.getElementById('cov');
var covlbl  = document.getElementById('cov-lbl');
var wc      = document.getElementById('wc');
var ph      = document.getElementById('ph');

var curFile    = 'untitled.html';
var compiled   = false;
var lastSrc    = '';
var activeProj = null;

// ── PROJECTS ──────────────────────────────────────────────────────────────────
var PJ_KEY = 'htmlleaf_v2_projects';
function getPJ(){ try{ return JSON.parse(localStorage.getItem(PJ_KEY))||[]; }catch(e){ return []; } }
function setPJ(l){ try{ localStorage.setItem(PJ_KEY,JSON.stringify(l)); }catch(e){} }

function renderPJ() {
  var list = getPJ();
  var el = document.getElementById('pjlist');
  if (!list.length) { el.innerHTML='<div class="pj-empty">No projects yet.<br>Click + New to start.</div>'; return; }
  el.innerHTML='';
  list.forEach(function(p) {
    var d = new Date(p.updated);
    var ds = d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
    var div = document.createElement('div');
    div.className = 'pji'+(p.id===activeProj?' active':'');
    div.innerHTML =
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:10px;height:10px;flex-shrink:0"><path d="M14 2H6a2 2 0 0 0-2 2v16c0 1.1.9 2 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'+
      '<div style="flex:1;overflow:hidden"><div class="pji-name">'+esc(p.name)+'</div><span class="pji-date">'+ds+'</span></div>'+
      '<button class="pji-del" title="Delete">✕</button>';
    div.querySelector('.pji-del').onclick = function(e){ e.stopPropagation(); delPJ(p.id); };
    div.onclick = function(){ openPJ(p.id); };
    el.appendChild(div);
  });
}

function openPJ(id) {
  if (activeProj) saveToPJ(activeProj,false);
  var list=getPJ(), p=list.find(function(x){return x.id===id;}); if(!p) return;
  activeProj=id; ed.value=p.content; curFile=p.name+'.html';
  setFilename(p.name+'.html'); compiled=false; lastSrc='';
  syncLN(); syncWC(); stxt.textContent='Opened: '+p.name; log('Opened: '+p.name);
  renderPJ(); compile();
}

function delPJ(id) {
  if (!confirm('Delete this project?')) return;
  setPJ(getPJ().filter(function(p){return p.id!==id;}));
  if (activeProj===id) activeProj=null;
  renderPJ(); log('Project deleted');
}

function saveToPJ(id, notify) {
  var list=getPJ(), idx=list.findIndex(function(p){return p.id===id;}); if(idx===-1) return;
  list[idx].content=ed.value; list[idx].updated=Date.now(); setPJ(list);
  if(notify!==false){ renderPJ(); stxt.textContent='Saved'; log('Project saved'); }
}

function saveNow() {
  if (activeProj) { saveToPJ(activeProj,true); return; }
  showModal('Save as Project','Save',function(name){ createPJ(name,ed.value); });
}

function createPJ(name,content) {
  var list=getPJ(), id='pj_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  list.unshift({id:id,name:name,content:content||STARTER,updated:Date.now()});
  setPJ(list); activeProj=id; ed.value=content||STARTER;
  curFile=name+'.html'; setFilename(curFile); syncLN(); syncWC();
  renderPJ(); log('Created: '+name); stxt.textContent='Project created: '+name;
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
var modalCb=null;
function showModal(title,ok,cb) {
  document.getElementById('mdl-title').textContent=title;
  document.getElementById('mdl-ok').textContent=ok;
  document.getElementById('mdl-input').value='';
  modalCb=cb;
  document.getElementById('mbg').classList.add('show');
  setTimeout(function(){document.getElementById('mdl-input').focus();},60);
}
function closeModal(){ document.getElementById('mbg').classList.remove('show'); modalCb=null; }
document.getElementById('mdl-cancel').onclick=closeModal;
document.getElementById('mdl-ok').onclick=function(){
  var n=document.getElementById('mdl-input').value.trim(); if(!n) return;
  closeModal(); if(modalCb) modalCb(n);
};
document.getElementById('mdl-input').onkeydown=function(e){
  if(e.key==='Enter') document.getElementById('mdl-ok').click();
  if(e.key==='Escape') closeModal();
};
document.getElementById('mbg').onclick=function(e){ if(e.target===this) closeModal(); };

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(s){ var d=document.createElement('div');d.textContent=s;return d.innerHTML; }

function syncLN() {
  var n=ed.value.split('\n').length, h='';
  for(var i=1;i<=n;i++) h+=i+'<br>';
  lnums.innerHTML=h;
}
function syncWC() {
  var plain=ed.value.replace(/<[^>]+>/g,' ').replace(/&[a-z]+;/gi,' ').replace(/\s+/g,' ').trim();
  var words=plain?plain.split(' ').filter(Boolean).length:0;
  wc.textContent=words+' words · '+ed.value.length+' chars';
}
function log(msg) {
  var t=new Date().toLocaleTimeString();
  clog.textContent+='['+t+'] '+msg+'\n'; clog.scrollTop=9999;
}
function setFilename(name) {
  curFile=name;
  document.getElementById('doc-name').textContent=name;
  document.getElementById('tab-fn').textContent=name;
  document.title='HTMLLeaf — '+name;
}
function getPageMM() {
  var sz=document.getElementById('pgsz').value;
  var ori=document.getElementById('pgori').value;
  var map={a4:[210,297],letter:[216,279],a3:[297,420]};
  var wh=map[sz]||[210,297]; var w=wh[0],h=wh[1];
  if(ori==='landscape'){var t=w;w=h;h=t;}
  return {w:w,h:h,sz:sz,ori:ori,pxW:Math.round(w*3.7795),pxH:Math.round(h*3.7795)};
}

// ── COMPILE ───────────────────────────────────────────────────────────────────
// Renders into a plain div (not iframe) so html2canvas can read it for PDF
function compile() {
  cov.classList.add('show'); covlbl.textContent='Compiling…';
  ph.style.display='none';
  stxt.textContent='Compiling…'; cstatus.className=''; cstatus.textContent='Compiling…';

  setTimeout(function(){
    try {
      var src=ed.value;
      var pg=getPageMM();

      // Extract just the body content + styles from full HTML documents
      var bodyContent='', headStyles='';
      var bodyMatch=src.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
      var styleMatch=src.match(/<style[^>]*>([\s\S]*?)<\/style>/gi);
      var linkMatch=src.match(/<link[^>]+>/gi);

      if(bodyMatch) {
        bodyContent=bodyMatch[1];
        if(styleMatch) headStyles=styleMatch.join('\n');
        if(linkMatch) headStyles+=linkMatch.join('\n');
      } else {
        // No full document — use as-is
        bodyContent=src;
        headStyles='<style>body{font-family:Georgia,serif;color:#1a1a1a;line-height:1.75;font-size:15px}h1{font-size:26px;border-bottom:2px solid #eee;padding-bottom:6px}h2{font-size:19px;margin-top:24px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ccc;padding:7px 11px}th{background:#f5f5f5}code{background:#f0f0f0;padding:2px 5px;border-radius:3px;font-family:monospace;color:#c7254e}blockquote{border-left:4px solid #4caf50;padding:8px 14px;color:#555;background:#f9fff9;margin:12px 0}</style>';
      }

      lastSrc=src;
      compiled=true;

      // srcdoc fills the iframe at 100% width/height — no CSS leakage
      pvdoc.srcdoc = src;

      cov.classList.remove('show');
      var ts=new Date().toLocaleTimeString();
      cstatus.textContent='✓ '+ts; cstatus.className='ok';
      stxt.textContent='Compiled at '+ts;
      clog.textContent='';
      log('OK — '+pg.sz.toUpperCase()+' '+pg.ori+' ('+pg.pxW+'×'+pg.pxH+'px)');
    } catch(e) {
      cov.classList.remove('show');
      cstatus.textContent='✗ '+e.message; cstatus.className='err';
      stxt.textContent='Error'; log('Error: '+e.message);
    }
  },80);
}

// ── DOWNLOAD HTML ─────────────────────────────────────────────────────────────
function downloadHTML() {
  var blob=new Blob([ed.value],{type:'text/html;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=curFile||'document.html';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(a.href);},2000);
  log('Downloaded: '+a.download);
}

// ── DOWNLOAD PDF — html2canvas reads pvdoc div directly (no iframe!) ──────────
function downloadPDF() {
  if (!compiled) { alert('Please compile first.'); return; }

  var btn = document.getElementById('btn-dl-pdf');
  btn.disabled = true; btn.textContent = '⏳ Generating…';
  cov.classList.add('show'); covlbl.textContent = 'Generating PDF…';
  stxt.textContent = 'Generating PDF…';

  // Create a totally invisible offscreen iframe — never touches the visible layout
  var pdfFrame = document.createElement('iframe');
  pdfFrame.style.cssText = 'position:fixed;left:-99999px;top:-99999px;width:1280px;height:10px;opacity:0;pointer-events:none;border:none;z-index:-999';
  document.body.appendChild(pdfFrame);

  pdfFrame.onload = function() {
    // Let the iframe fully paint before measuring
    setTimeout(function() {
      try {
        var iWin = pdfFrame.contentWindow;
        var iDoc = pdfFrame.contentDocument || iWin.document;
        var iBody = iDoc.body;

        // Measure exact content dimensions — no guessing
        var contentW = iBody.scrollWidth;
        var contentH = iBody.scrollHeight;

        // Set the iframe to exact content size so html2canvas captures everything
        pdfFrame.style.width  = contentW + 'px';
        pdfFrame.style.height = contentH + 'px';

        // Another tick to let browser reflow to new size
        setTimeout(function() {
          html2canvas(iBody, {
            scale: 2,
            useCORS: true,
            allowTaint: true,
            backgroundColor: '#ffffff',
            width: contentW,
            height: contentH,
            windowWidth: contentW,
            windowHeight: contentH,
            scrollX: 0,
            scrollY: 0,
            logging: false
          }).then(function(canvas) {
            var jsPDF = window.jspdf.jsPDF;

            // PDF dimensions = exact pixel content size converted to mm at 96dpi
            var PX_TO_MM = 25.4 / 96;
            var pdfW = contentW * PX_TO_MM;
            var pdfH = contentH * PX_TO_MM;

            // Single custom-sized page = exactly what you see, nothing more, nothing less
            var pdf = new jsPDF({
              orientation: pdfW > pdfH ? 'l' : 'p',
              unit: 'mm',
              format: [pdfW, pdfH]
            });

            pdf.addImage(
              canvas.toDataURL('image/jpeg', 0.97),
              'JPEG', 0, 0, pdfW, pdfH
            );

            var fname = (curFile.replace(/\.html?$/i, '') || 'document') + '.pdf';
            pdf.save(fname);

            // Clean up the offscreen iframe — preview is untouched
            document.body.removeChild(pdfFrame);
            cov.classList.remove('show');
            btn.disabled = false; btn.textContent = '⬇ PDF';
            stxt.textContent = 'PDF saved: ' + fname;
            log('PDF saved: ' + fname);
          }).catch(function(err) {
            document.body.removeChild(pdfFrame);
            cov.classList.remove('show');
            btn.disabled = false; btn.textContent = '⬇ PDF';
            stxt.textContent = 'PDF error: ' + err.message;
            log('PDF error: ' + err.message);
            alert('PDF error: ' + err.message);
          });
        }, 200);
      } catch(e) {
        document.body.removeChild(pdfFrame);
        cov.classList.remove('show');
        btn.disabled = false; btn.textContent = '⬇ PDF';
        alert('PDF error: ' + e.message);
      }
    }, 300);
  };

  // Load the exact same source into the offscreen iframe
  pdfFrame.srcdoc = lastSrc;
}

// ── WRAP SELECTION ────────────────────────────────────────────────────────────
function wrapSel(o,c) {
  var s=ed.selectionStart,e=ed.selectionEnd;
  var sel=ed.value.slice(s,e)||'text';
  var ins=o+sel+c;
  ed.value=ed.value.slice(0,s)+ins+ed.value.slice(e);
  ed.selectionStart=s; ed.selectionEnd=s+ins.length;
  ed.focus(); syncLN();
}

// ── TOOLBAR ───────────────────────────────────────────────────────────────────
document.getElementById('tb-b'   ).onclick=function(){ wrapSel('<strong>','</strong>'); };
document.getElementById('tb-i'   ).onclick=function(){ wrapSel('<em>','</em>'); };
document.getElementById('tb-u'   ).onclick=function(){ wrapSel('<u>','</u>'); };
document.getElementById('tb-s'   ).onclick=function(){ wrapSel('<s>','</s>'); };
document.getElementById('tb-r'   ).onclick=function(){ wrapSel('<span style="color:#e53935">','</span>'); };
document.getElementById('tb-bl'  ).onclick=function(){ wrapSel('<span style="color:#1e88e5">','</span>'); };
document.getElementById('tb-g'   ).onclick=function(){ wrapSel('<span style="color:#43a047">','</span>'); };
document.getElementById('tb-sub' ).onclick=function(){ wrapSel('<sub>','</sub>'); };
document.getElementById('tb-sup' ).onclick=function(){ wrapSel('<sup>','</sup>'); };
document.getElementById('tb-mk'  ).onclick=function(){ wrapSel('<mark>','</mark>'); };
document.getElementById('tb-code').onclick=function(){ wrapSel('<code>','</code>'); };

// ── INSERT SNIPPETS ───────────────────────────────────────────────────────────
var SNIPS={
  h1:'<h1>Heading 1</h1>\n',h2:'<h2>Heading 2</h2>\n',h3:'<h3>Heading 3</h3>\n',
  p:'<p>Your paragraph text here.</p>\n',
  ul:'<ul>\n  <li>Item one</li>\n  <li>Item two</li>\n  <li>Item three</li>\n</ul>\n',
  ol:'<ol>\n  <li>First</li>\n  <li>Second</li>\n  <li>Third</li>\n</ol>\n',
  table:'<table>\n  <tr><th>Col A</th><th>Col B</th><th>Col C</th></tr>\n  <tr><td>Data</td><td>Data</td><td>Data</td></tr>\n  <tr><td>Data</td><td>Data</td><td>Data</td></tr>\n</table>\n',
  img:'<img src="https://placehold.co/480x240?text=Image" alt="Image" style="max-width:100%;display:block;margin:10px 0">\n',
  code:'<pre><code>// your code\nconsole.log("hello");\n</code></pre>\n',
  blockquote:'<blockquote>"Quote here." &mdash; Author</blockquote>\n',
  hr:'<hr>\n',
  link:'<a href="https://example.com" target="_blank">Link text</a>',
  div:'<div style="padding:14px;border:1px solid #ddd;border-radius:4px;margin:10px 0">\n  Content\n</div>\n'
};
document.getElementById('ins-tag').onchange=function(){
  var tag=this.value; if(!tag) return;
  var ins=SNIPS[tag]||'<'+tag+'></'+tag+'>\n';
  var pos=ed.selectionStart;
  var bef=ed.value.slice(0,pos),aft=ed.value.slice(pos);
  var pad=(bef.length&&!bef.endsWith('\n'))?'\n':'';
  ed.value=bef+pad+ins+aft;
  ed.selectionStart=ed.selectionEnd=pos+pad.length+ins.length;
  ed.focus(); syncLN(); this.value='';
};

// ── INDENT ────────────────────────────────────────────────────────────────────
document.getElementById('btn-indent').onclick=function(){
  var s=ed.selectionStart,e=ed.selectionEnd; if(s===e) return;
  var b=ed.value.slice(0,s),sel=ed.value.slice(s,e),a=ed.value.slice(e);
  var ind=sel.split('\n').map(function(l){return'  '+l;}).join('\n');
  ed.value=b+ind+a; ed.selectionStart=s; ed.selectionEnd=s+ind.length;
  ed.focus(); syncLN();
};

// ── FORMAT ────────────────────────────────────────────────────────────────────
document.getElementById('btn-fmt').onclick=function(){
  var voids='area base br col embed hr img input link meta param source track wbr'.split(' ');
  var html=ed.value.replace(/>\s+</g,'>\n<').replace(/\n{3,}/g,'\n\n');
  var lines=html.split('\n'),depth=0,result=[];
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim(); if(!line){result.push('');continue;}
    var m=line.match(/^<([a-zA-Z][a-zA-Z0-9]*)/);
    var tag=m?m[1].toLowerCase():null;
    var isC=/^<\//.test(line),isS=/\/>$/.test(line),isV=tag&&voids.indexOf(tag)!==-1,isD=/^<!/.test(line);
    if(isC) depth=Math.max(0,depth-1);
    result.push((isD?'':'  '.repeat(depth))+line);
    if(!isC&&!isV&&!isS&&tag) depth++;
  }
  ed.value=result.join('\n'); syncLN(); ed.focus(); log('Formatted');
};

document.getElementById('btn-recompile').onclick=compile;

document.getElementById('btn-fs'       ).onclick=function(){
  var el=document.getElementById('pvwrap');
  (el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el);
};
document.getElementById('fileinput').onchange=function(e){
  var file=e.target.files[0]; if(!file) return;
  var r=new FileReader();
  r.onload=function(ev){
    ed.value=ev.target.result; setFilename(file.name); activeProj=null;
    syncLN(); syncWC(); stxt.textContent='Opened: '+file.name; log('Opened: '+file.name); compile();
  };
  r.readAsText(file); this.value='';
};

document.getElementById('pgsz' ).onchange=function(){ if(compiled) compile(); };
document.getElementById('pgori').onchange=function(){ if(compiled) compile(); };

// ── EDITOR EVENTS ─────────────────────────────────────────────────────────────
ed.oninput=function(){ syncLN(); syncWC(); stxt.textContent='Modified — Ctrl+Enter to compile'; };
ed.onscroll=function(){ lnums.scrollTop=ed.scrollTop; };
ed.onkeydown=function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){ e.preventDefault(); compile(); return; }
  if((e.ctrlKey||e.metaKey)&&e.key==='s')   { e.preventDefault(); saveNow(); return; }
  if((e.ctrlKey||e.metaKey)&&e.key==='b')   { e.preventDefault(); wrapSel('<strong>','</strong>'); return; }
  if((e.ctrlKey||e.metaKey)&&e.key==='i')   { e.preventDefault(); wrapSel('<em>','</em>'); return; }
  if(e.key==='Tab'){
    e.preventDefault();
    var s=ed.selectionStart,en=ed.selectionEnd;
    if(s===en){ ed.value=ed.value.slice(0,s)+'  '+ed.value.slice(en); ed.selectionStart=ed.selectionEnd=s+2; }
    else {
      var b=ed.value.slice(0,s),sel=ed.value.slice(s,en),a=ed.value.slice(en);
      var ind=sel.split('\n').map(function(l){return'  '+l;}).join('\n');
      ed.value=b+ind+a; ed.selectionStart=s; ed.selectionEnd=s+ind.length;
    }
    syncLN();
  }
};
ed.onkeyup=syncCursor; ed.onclick=syncCursor;
function syncCursor(){ var t=ed.value.slice(0,ed.selectionStart),l=t.split('\n'); cpos.textContent='Ln '+l.length+', Col '+(l[l.length-1].length+1); }

// ── INIT ──────────────────────────────────────────────────────────────────────
ed.value=STARTER; syncLN(); syncWC(); syncCursor(); renderPJ(); compile();
</script>
